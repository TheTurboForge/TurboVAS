name: TurboVAS CodeQL configuration

query-filters:
  # TurboVAS retains NASL DES/RC4 builtins for scanner script compatibility.
  # These primitives are not new product cryptography choices; higher-level
  # removal requires feed/script compatibility work rather than a local rename.
  - exclude:
      id: rust/weak-cryptographic-algorithm
